        <section class="page-header">
            <div class="container">
                <h1>联系我</h1>
                <p>有任何问题或合作意向，欢迎随时联系</p>
            </div>
        </section>

        <section class="contact-section">
            <div class="container">
                <div class="contact-grid">
                    <div class="contact-info">
                        <h2>联系方式</h2>
                        <p>无论是技术交流、项目合作，还是单纯的聊聊天，我都很乐意与你交流。</p>
                        
                        <div class="contact-methods">
                            <div class="contact-item">
                                <div class="contact-icon">📧</div>
                                <div class="contact-detail">
                                    <h3>邮箱</h3>
                                    <p>hello@example.com</p>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon">💬</div>
                                <div class="contact-detail">
                                    <h3>微信</h3>
                                    <p>my_wechat_id</p>
                                </div>
                            </div>
                            <div class="contact-item">
                                <div class="contact-icon">📍</div>
                                <div class="contact-detail">
                                    <h3>位置</h3>
                                    <p>中国 · 北京</p>
                                </div>
                            </div>
                        </div>

                        <div class="social-links">
                            <h3>社交媒体</h3>
                            <div class="social-icons">
                                <a href="#" class="social-icon" aria-label="GitHub">

                                    </svg>
                                </a>
                                <a href="#" class="social-icon" aria-label="LinkedIn">
                                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"/>

                                </a>
                            </div>
                        </div>
                    </div>

                    <div class="contact-form-wrapper">
                        <h2>发送消息</h2>
                        <form class="contact-form" id="contactForm">
                            <div class="form-group">
                                <label for="name">姓名 *</label>
                                <input type="text" id="name" name="name" required placeholder="请输入你的姓名">
                            </div>
                            <div class="form-group">
                                <label for="email">邮箱 *</label>
                                <input type="email" id="email" name="email" required placeholder="请输入你的邮箱">
                            </div>
                            <div class="form-group">
                                <label for="subject">主题</label>
                                <input type="text" id="subject" name="subject" placeholder="请输入消息主题">
                            </div>
                            <div class="form-group">
                                <label for="message">消息 *</label>
                                <textarea id="message" name="message" rows="5" required placeholder="请输入你的消息..."></textarea>
                            </div>
                            <button type="submit" class="btn btn-primary btn-block">发送消息</button>
                        </form>
                    </div>
                </div>
            </div>
        </section>
    </main>
